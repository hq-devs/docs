<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>点表智能工作台 - 系统设计可视化</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --panel-2: #f8fafc;
      --text: #1f2937;
      --muted: #64748b;
      --line: #d8dee8;
      --line-strong: #9aa7bb;
      --brand: #0f766e;
      --brand-2: #2563eb;
      --amber: #b45309;
      --green: #15803d;
      --rose: #be123c;
      --violet: #7c3aed;
      --cyan: #0891b2;
      --shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      color: var(--text);
      background: var(--bg);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    body {
      overflow: auto;
    }

    button,
    input {
      font: inherit;
    }

    .app {
      display: grid;
      grid-template-columns: 264px minmax(620px, 1fr) 352px;
      height: 100vh;
      min-height: 720px;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 22px 16px;
      border-right: 1px solid var(--line);
      background: #eef3f8;
    }

    .brand {
      display: grid;
      gap: 8px;
      padding: 0 8px 8px;
    }

    .brand h1 {
      margin: 0;
      font-size: 21px;
      line-height: 1.2;
      font-weight: 760;
    }

    .brand p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .nav {
      display: grid;
      gap: 8px;
    }

    .nav button {
      width: 100%;
      min-height: 54px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      background: transparent;
      color: #334155;
      cursor: pointer;
      text-align: left;
      padding: 10px 12px;
      transition: background 160ms ease, border-color 160ms ease, color 160ms ease, transform 160ms ease;
    }

    .nav button:hover {
      background: rgba(255, 255, 255, 0.72);
      border-color: #dbe3ee;
    }

    .nav button.active {
      color: #0f172a;
      background: #ffffff;
      border-color: #b8c5d7;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.07);
    }

    .nav strong {
      display: block;
      font-size: 14px;
      line-height: 1.25;
      font-weight: 750;
    }

    .nav span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .legend {
      margin-top: auto;
      padding: 12px;
      border: 1px solid #d7e0eb;
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.68);
    }

    .legend h2,
    .right h2,
    .right h3 {
      margin: 0;
      font-size: 14px;
      line-height: 1.3;
    }

    .legend ul {
      display: grid;
      gap: 9px;
      margin: 12px 0 0;
      padding: 0;
      list-style: none;
      color: #475569;
      font-size: 12px;
    }

    .legend li {
      display: grid;
      grid-template-columns: 14px 1fr;
      gap: 8px;
      align-items: center;
    }

    .dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: var(--brand);
    }

    .dot.server { background: var(--brand-2); }
    .dot.job { background: var(--amber); }
    .dot.store { background: var(--violet); }
    .dot.device { background: var(--green); }
    .dot.risk { background: var(--rose); }

    .main {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-width: 0;
      background: #f9fbfd;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.72);
    }

    .title-block {
      min-width: 0;
    }

    .eyebrow {
      margin: 0 0 4px;
      color: var(--brand);
      font-size: 12px;
      font-weight: 760;
    }

    .scene-title {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      font-weight: 820;
    }

    .scene-copy {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      max-width: 940px;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon-btn {
      display: inline-grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border: 1px solid #cfd8e5;
      border-radius: var(--radius);
      color: #0f172a;
      background: #ffffff;
      cursor: pointer;
    }

    .icon-btn:hover {
      border-color: #94a3b8;
      background: #f8fafc;
    }

    .speed {
      display: grid;
      grid-template-columns: auto 86px;
      gap: 8px;
      align-items: center;
      padding: 0 4px 0 10px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .speed input {
      width: 86px;
      accent-color: var(--brand);
    }

    .canvas-shell {
      position: relative;
      min-height: 0;
      padding: 16px 18px 10px;
    }

    .canvas-wrap {
      position: relative;
      height: 100%;
      min-height: 480px;
      border: 1px solid #d8e0eb;
      border-radius: var(--radius);
      background: #ffffff;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: default;
    }

    .canvas-note {
      position: absolute;
      left: 14px;
      bottom: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      pointer-events: none;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 26px;
      padding: 4px 8px;
      border: 1px solid rgba(148, 163, 184, 0.5);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.86);
      color: #475569;
      font-size: 12px;
      line-height: 1.2;
      backdrop-filter: blur(8px);
    }

    .timeline {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
      padding: 0 18px 18px;
    }

    .timeline button {
      min-width: 0;
      min-height: 58px;
      border: 1px solid #d6dfeb;
      border-radius: var(--radius);
      background: #ffffff;
      color: #475569;
      cursor: pointer;
      padding: 8px;
      text-align: left;
      transition: border-color 160ms ease, background 160ms ease, transform 160ms ease;
    }

    .timeline button:hover {
      border-color: #9aa7bb;
      background: #f8fafc;
    }

    .timeline button.active {
      border-color: var(--brand);
      background: #ecfdf5;
      color: #134e4a;
    }

    .timeline .step-no {
      display: inline-grid;
      place-items: center;
      width: 20px;
      height: 20px;
      margin-right: 6px;
      border-radius: 50%;
      color: #ffffff;
      background: var(--brand);
      font-size: 11px;
      font-weight: 760;
      vertical-align: top;
    }

    .timeline strong {
      display: block;
      margin-top: 3px;
      font-size: 12px;
      line-height: 1.25;
      font-weight: 730;
    }

    .timeline span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
    }

    .right {
      display: flex;
      flex-direction: column;
      min-width: 0;
      padding: 18px 16px;
      gap: 12px;
      border-left: 1px solid var(--line);
      background: #f1f5f9;
      overflow-y: auto;
    }

    .panel {
      border: 1px solid #d7e0eb;
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.05);
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 13px;
      border-bottom: 1px solid #e4e9f1;
    }

    .panel-body {
      padding: 13px;
    }

    .detail-title {
      margin: 0;
      font-size: 16px;
      line-height: 1.35;
      font-weight: 790;
    }

    .detail-type {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 3px 8px;
      border-radius: 999px;
      color: #0f172a;
      background: #eef6ff;
      font-size: 11px;
      white-space: nowrap;
    }

    .detail-copy,
    .step-copy {
      margin: 0;
      color: #475569;
      font-size: 13px;
      line-height: 1.6;
    }

    .kv {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .kv-row {
      display: grid;
      grid-template-columns: 76px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      padding: 8px 0;
      border-top: 1px solid #eef2f7;
      font-size: 12px;
      line-height: 1.45;
    }

    .kv-row:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .kv-row b {
      color: #64748b;
      font-weight: 700;
    }

    .kv-row span {
      color: #1f2937;
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .pill-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 11px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 4px 8px;
      border: 1px solid #d6dfeb;
      border-radius: 999px;
      background: #f8fafc;
      color: #475569;
      font-size: 11px;
      line-height: 1.2;
    }

    .fact-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .fact-list li {
      display: grid;
      grid-template-columns: 9px 1fr;
      gap: 8px;
      color: #475569;
      font-size: 12px;
      line-height: 1.55;
    }

    .fact-list li::before {
      content: "";
      width: 7px;
      height: 7px;
      margin-top: 6px;
      border-radius: 50%;
      background: var(--brand);
    }

    .mini-table {
      display: grid;
      gap: 8px;
    }

    .mini-row {
      display: grid;
      grid-template-columns: 92px minmax(0, 1fr);
      gap: 8px;
      padding: 9px;
      border: 1px solid #e1e7f0;
      border-radius: var(--radius);
      background: #fbfdff;
      font-size: 12px;
      line-height: 1.45;
    }

    .mini-row b {
      color: #334155;
    }

    .mini-row span {
      color: #64748b;
      overflow-wrap: anywhere;
    }

    .api-tools {
      display: grid;
      gap: 9px;
    }

    .api-search {
      width: 100%;
      min-height: 34px;
      border: 1px solid #cfd8e5;
      border-radius: var(--radius);
      background: #ffffff;
      color: #0f172a;
      padding: 7px 9px;
      font-size: 12px;
      outline: none;
    }

    .api-search:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.12);
    }

    .domain-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .domain-tabs button {
      min-height: 25px;
      border: 1px solid #d6dfeb;
      border-radius: 999px;
      background: #f8fafc;
      color: #475569;
      cursor: pointer;
      padding: 4px 8px;
      font-size: 11px;
      line-height: 1.2;
    }

    .domain-tabs button.active {
      border-color: var(--brand);
      background: #ecfdf5;
      color: #134e4a;
      font-weight: 720;
    }

    .api-list {
      display: grid;
      gap: 8px;
      max-height: 390px;
      overflow: auto;
      padding-right: 3px;
    }

    .api-item {
      display: grid;
      gap: 6px;
      padding: 9px;
      border: 1px solid #e1e7f0;
      border-radius: var(--radius);
      background: #fbfdff;
    }

    .api-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 7px;
      align-items: center;
      min-width: 0;
    }

    .method {
      display: inline-grid;
      place-items: center;
      min-width: 44px;
      min-height: 21px;
      padding: 3px 6px;
      border-radius: 5px;
      color: #ffffff;
      background: #475569;
      font-size: 10px;
      font-weight: 780;
      line-height: 1;
    }

    .method.get { background: #2563eb; }
    .method.post { background: #15803d; }
    .method.ws { background: #7c3aed; }
    .method.sse { background: #0891b2; }
    .method.bridge { background: #0f766e; }
    .method.policy { background: #64748b; }
    .method.external { background: #b45309; }

    .endpoint {
      color: #0f172a;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 11px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .api-name {
      color: #334155;
      font-size: 12px;
      font-weight: 740;
      line-height: 1.35;
    }

    .api-desc {
      color: #64748b;
      font-size: 12px;
      line-height: 1.45;
    }

    .api-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .api-meta span {
      display: inline-flex;
      align-items: center;
      min-height: 20px;
      padding: 3px 6px;
      border-radius: 999px;
      background: #eef2f7;
      color: #475569;
      font-size: 10px;
      line-height: 1.1;
    }

    @media (max-width: 1180px) {
      body {
        overflow: auto;
      }

      .app {
        grid-template-columns: 220px minmax(520px, 1fr);
        grid-template-rows: minmax(720px, auto) auto;
        height: auto;
      }

      .right {
        grid-column: 1 / -1;
        border-left: 0;
        border-top: 1px solid var(--line);
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 780px) {
      .app {
        display: block;
      }

      .sidebar {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .nav {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .topbar {
        grid-template-columns: 1fr;
      }

      .canvas-wrap {
        min-height: 520px;
      }

      .timeline {
        grid-template-columns: 1fr;
      }

      .right {
        display: flex;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <h1>系统设计可视化</h1>
        <p>把点表智能工作台拆成角色、链路、数据和演进阶段，帮助快速建立整体心智模型。</p>
      </div>

      <nav class="nav" id="sceneNav" aria-label="系统视图"></nav>

      <section class="legend" aria-label="图例">
        <h2>颜色图例</h2>
        <ul>
          <li><span class="dot"></span><span>本地桌面与工程目录</span></li>
          <li><span class="dot server"></span><span>云端后端与 API</span></li>
          <li><span class="dot job"></span><span>生成任务与 jobfs</span></li>
          <li><span class="dot store"></span><span>数据库/索引/审计</span></li>
          <li><span class="dot device"></span><span>现场设备与 xboard</span></li>
          <li><span class="dot risk"></span><span>待建设或风险点</span></li>
        </ul>
      </section>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="title-block">
          <p class="eyebrow" id="eyebrow">系统拓扑</p>
          <h2 class="scene-title" id="sceneTitle">整体 C/S 架构</h2>
          <p class="scene-copy" id="sceneCopy"></p>
        </div>
        <div class="controls" aria-label="动画控制">
          <button class="icon-btn" id="prevBtn" title="上一步" aria-label="上一步">‹</button>
          <button class="icon-btn" id="playBtn" title="播放/暂停" aria-label="播放/暂停">Ⅱ</button>
          <button class="icon-btn" id="nextBtn" title="下一步" aria-label="下一步">›</button>
          <label class="speed">
            速度
            <input id="speedRange" type="range" min="0.5" max="2.4" step="0.1" value="1" />
          </label>
        </div>
      </header>

      <section class="canvas-shell">
        <div class="canvas-wrap">
          <canvas id="mapCanvas"></canvas>
          <div class="canvas-note" id="canvasNote"></div>
        </div>
      </section>

      <section class="timeline" id="timeline" aria-label="当前视图步骤"></section>
    </main>

    <aside class="right">
      <section class="panel">
        <div class="panel-head">
          <h2>当前步骤</h2>
          <span class="detail-type" id="stepIndex">1 / 5</span>
        </div>
        <div class="panel-body">
          <h3 class="detail-title" id="stepTitle"></h3>
          <p class="step-copy" id="stepCopy"></p>
          <div class="pill-list" id="stepTags"></div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>选中节点</h2>
          <span class="detail-type" id="nodeType">节点</span>
        </div>
        <div class="panel-body">
          <h3 class="detail-title" id="nodeTitle"></h3>
          <p class="detail-copy" id="nodeCopy"></p>
          <div class="kv" id="nodeKV"></div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>设计要点</h2>
        </div>
        <div class="panel-body">
          <ul class="fact-list" id="facts"></ul>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>存储边界</h2>
        </div>
        <div class="panel-body">
          <div class="mini-table" id="storageTable"></div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>API 目录</h2>
          <span class="detail-type" id="apiCount">0</span>
        </div>
        <div class="panel-body api-tools">
          <input class="api-search" id="apiSearch" type="search" placeholder="搜索路径、方法、说明、域名" />
          <div class="domain-tabs" id="apiDomainTabs"></div>
          <div class="api-list" id="apiList"></div>
        </div>
      </section>
    </aside>
  </div>

  <script>
    const palette = {
      local: "#0f766e",
      server: "#2563eb",
      job: "#b45309",
      store: "#7c3aed",
      device: "#15803d",
      external: "#0891b2",
      risk: "#be123c",
      neutral: "#475569"
    };

    const sharedNodes = {
      ui: {
        id: "ui",
        label: "前端 UI\n三栏工作台",
        type: "本地桌面",
        color: "local",
        detail: "工程师看到的主界面。负责项目导航、点表编辑、证据查看、澄清处理和 AI 调试面板。",
        fields: {
          "所在位置": "工程师电脑",
          "主要输入": "协议文档、人工确认、调试决策",
          "主要输出": "生成任务、澄清答案、apply 决策、发布动作"
        }
      },
      bridge: {
        id: "bridge",
        label: "Wails Go Bridge\n本地能力层",
        type: "桌面 Bridge",
        color: "local",
        detail: "Bridge 是桌面 App 里的本地 Go 层。它把前端和本机能力连接起来，包括工程目录、串口/TCP、WSS 设备隧道和本地配置。",
        fields: {
          "代码位置": "ai-point-web/desktop/app.go",
          "典型方法": "SaveDSL、SendFrame、ListSerialPorts、SubmitToServer",
          "关键边界": "设备接在工程师电脑上，云端通过 Bridge 间接访问"
        }
      },
      localfs: {
        id: "localfs",
        label: "本地工程目录\npoint_table.json 权威",
        type: "本地存储",
        color: "local",
        detail: "最终点表以本机 JSON DSL 为权威数据源。xlsx 是副本，evidence/debug/session 是辅助产物。",
        fields: {
          "核心文件": "tasks/{task_id}/point_table.json",
          "副本文件": "point_table.xlsx、evidence.json",
          "会话文件": "clarifications/、debug/、sessions/"
        }
      },
      device: {
        id: "device",
        label: "现场物理设备\n串口 / TCP",
        type: "现场设备",
        color: "device",
        detail: "真实设备通过串口、Modbus RTU、Modbus TCP 等本地链路接入工程师电脑，不直接接云端。",
        fields: {
          "连接对象": "工程师电脑上的 Bridge",
          "数据形态": "请求帧、响应帧、原始 hex、解析值",
          "作用": "验证 AI 生成的寄存器、功能码、解析函数是否正确"
        }
      },

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.max(1, Math.floor(rect.width * dpr));
      canvas.height = Math.max(1, Math.floor(rect.height * dpr));
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      const scale = Math.min(rect.width / view.w, rect.height / view.h);
      view.scale = scale;
      view.offsetX = (rect.width - view.w * scale) / 2;
      view.offsetY = (rect.height - view.h * scale) / 2;
    }

    function logicalToCanvas(p) {
      return {
        x: view.offsetX + p.x * view.scale,
        y: view.offsetY + p.y * view.scale
      };
    }

    function canvasToLogical(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: (clientX - rect.left - view.offsetX) / view.scale,
        y: (clientY - rect.top - view.offsetY) / view.scale
      };
    }

    function roundedRectPath(c, x, y, w, h, r) {
      const rr = Math.min(r, w / 2, h / 2);
      c.beginPath();
      c.moveTo(x + rr, y);
      c.arcTo(x + w, y, x + w, y + h, rr);
      c.arcTo(x + w, y + h, x, y + h, rr);
      c.arcTo(x, y + h, x, y, rr);
      c.arcTo(x, y, x + w, y, rr);
      c.closePath();
    }

    function wrapLines(c, text, maxWidth) {
      const raw = String(text).split("\n");
      const lines = [];
      raw.forEach(part => {
        let current = "";
        const chars = Array.from(part);
        chars.forEach(ch => {
          const test = current + ch;
          if (c.measureText(test).width > maxWidth && current) {
            lines.push(current);
            current = ch;
          } else {
            current = test;
          }
        });
        if (current) lines.push(current);
      });
      return lines;
    }

    function nodeCenter(node) {
      return { x: node.x + node.w / 2, y: node.y + node.h / 2 };
    }

    function edgePoints(scene, from, to) {
      const a = scene.nodes[from];
      const b = scene.nodes[to];
      if (!a || !b) return null;
      const ca = nodeCenter(a);
      const cb = nodeCenter(b);
      const dx = cb.x - ca.x;
      const dy = cb.y - ca.y;
      const ax = Math.abs(dx);
      const ay = Math.abs(dy);
      let start = { ...ca };
      let end = { ...cb };
      if (ax > ay) {
        start.x += Math.sign(dx) * a.w / 2;
        end.x -= Math.sign(dx) * b.w / 2;
      } else {
        start.y += Math.sign(dy) * a.h / 2;
        end.y -= Math.sign(dy) * b.h / 2;
      }
      return { start, end, dx, dy };
    }

    function drawArrow(c, start, end, color, width, active) {
      const p1 = logicalToCanvas(start);
      const p2 = logicalToCanvas(end);
      const dx = p2.x - p1.x;
      const dy = p2.y - p1.y;
      const len = Math.hypot(dx, dy) || 1;
      const nx = -dy / len;
      const ny = dx / len;
      const bend = Math.min(56, len * 0.14) * (active ? 1 : 0.55);
      const cx = (p1.x + p2.x) / 2 + nx * bend;
      const cy = (p1.y + p2.y) / 2 + ny * bend;

      c.save();
      c.strokeStyle = color;
      c.lineWidth = width;
      c.globalAlpha = active ? 0.92 : 0.35;
      c.beginPath();
      c.moveTo(p1.x, p1.y);
      c.quadraticCurveTo(cx, cy, p2.x, p2.y);
      c.stroke();

      const t = 0.92;
      const qx = (1 - t) * (1 - t) * p1.x + 2 * (1 - t) * t * cx + t * t * p2.x;
      const qy = (1 - t) * (1 - t) * p1.y + 2 * (1 - t) * t * cy + t * t * p2.y;
      const tx = 2 * (1 - t) * (cx - p1.x) + 2 * t * (p2.x - cx);
      const ty = 2 * (1 - t) * (cy - p1.y) + 2 * t * (p2.y - cy);
      const angle = Math.atan2(ty, tx);
      const size = active ? 9 : 7;
      c.beginPath();
      c.moveTo(qx, qy);
      c.lineTo(qx - Math.cos(angle - Math.PI / 6) * size, qy - Math.sin(angle - Math.PI / 6) * size);
      c.lineTo(qx - Math.cos(angle + Math.PI / 6) * size, qy - Math.sin(angle + Math.PI / 6) * size);
      c.closePath();
      c.fillStyle = color;
      c.fill();
      c.restore();

      return { p1, p2, cx, cy };
    }

    function pointOnQuad(p1, c, p2, t) {
      return {
        x: (1 - t) * (1 - t) * p1.x + 2 * (1 - t) * t * c.x + t * t * p2.x,
        y: (1 - t) * (1 - t) * p1.y + 2 * (1 - t) * t * c.y + t * t * p2.y
      };
    }

    function drawPacket(c, curve, t, color, label) {
      const p = pointOnQuad(curve.p1, { x: curve.cx, y: curve.cy }, curve.p2, t);
      c.save();
      c.shadowColor = "rgba(15, 23, 42, 0.2)";
      c.shadowBlur = 10;
      c.fillStyle = color;
      c.beginPath();
      c.arc(p.x, p.y, 7, 0, Math.PI * 2);
      c.fill();
      c.shadowBlur = 0;
      c.fillStyle = "#ffffff";
      c.beginPath();
      c.arc(p.x, p.y, 2.5, 0, Math.PI * 2);
      c.fill();
      if (label) {
        c.font = "11px ui-sans-serif, system-ui, sans-serif";
        const tw = c.measureText(label).width;
        roundedRectPath(c, p.x + 10, p.y - 15, tw + 14, 24, 6);
        c.fillStyle = "rgba(255, 255, 255, 0.94)";
        c.fill();
        c.strokeStyle = "rgba(148, 163, 184, 0.55)";
        c.stroke();
        c.fillStyle = "#334155";
        c.fillText(label, p.x + 17, p.y + 1);
      }
      c.restore();
    }

    function drawGroup(c, group) {
      const p = logicalToCanvas(group);
      const w = group.w * view.scale;
      const h = group.h * view.scale;
      const color = palette[group.color] || palette.neutral;
      c.save();
      roundedRectPath(c, p.x, p.y, w, h, 14);
      c.fillStyle = color + "0d";
      c.fill();
      c.strokeStyle = color + "55";
      c.lineWidth = 1;
      c.stroke();
      c.font = "700 13px ui-sans-serif, system-ui, sans-serif";
      c.fillStyle = color;
      c.fillText(group.label, p.x + 14, p.y + 24);
      c.restore();
    }

    function drawNode(c, scene, id, activeSet) {
      const n = scene.nodes[id];
      const info = nodeInfo(scene, id);
      const p = logicalToCanvas(n);
      const w = n.w * view.scale;
      const h = n.h * view.scale;
      const color = palette[info.color] || palette.neutral;
      const isActive = activeSet.has(id);
      const isSelected = selectedNode === id;
      const isHover = hoverNode === id;

      c.save();
      roundedRectPath(c, p.x, p.y, w, h, 10);
      c.fillStyle = "#ffffff";
      c.fill();
      c.shadowColor = isActive || isSelected ? color + "44" : "rgba(15, 23, 42, 0.08)";
      c.shadowBlur = isActive || isSelected ? 18 : 8;
      c.strokeStyle = isSelected ? color : (isActive ? color : "#cfd8e5");
      c.lineWidth = isSelected ? 3 : (isActive ? 2 : 1);
      c.stroke();
      c.shadowBlur = 0;

      c.fillStyle = color;
      c.beginPath();
      c.roundRect ? c.roundRect(p.x, p.y, 6, h, 8) : roundedRectPath(c, p.x, p.y, 6, h, 3);
      c.fill();

      c.font = `760 ${Math.max(11, 14 * view.scale)}px ui-sans-serif, system-ui, sans-serif`;
      c.fillStyle = "#0f172a";
      c.textBaseline = "middle";
      const maxWidth = w - 28;
      const lines = wrapLines(c, info.label, maxWidth).slice(0, 3);
      const lineHeight = Math.max(15, 18 * view.scale);
      const total = lineHeight * lines.length;
      let y = p.y + h / 2 - total / 2 + lineHeight / 2;
      lines.forEach(line => {
        c.fillText(line, p.x + 18, y);
        y += lineHeight;
      });

      if (isHover && !isSelected) {
        roundedRectPath(c, p.x + 8, p.y + h - 22, Math.min(86, w - 16), 16, 8);
        c.fillStyle = color + "18";
        c.fill();
        c.fillStyle = color;
        c.font = `700 ${Math.max(9, 10 * view.scale)}px ui-sans-serif, system-ui, sans-serif`;
        c.fillText("点击查看", p.x + 16, p.y + h - 14);
      }
      c.restore();
    }

    function draw() {
      resizeCanvas();
      const scene = scenes[sceneKey];
      const step = scene.steps[stepIndex];
      const activeEdges = step.edges || [];
      const activeSet = new Set([step.focus, selectedNode].filter(Boolean));
      activeEdges.forEach(([a, b]) => {
        activeSet.add(a);
        activeSet.add(b);
      });

      const rect = canvas.getBoundingClientRect();
      ctx.clearRect(0, 0, rect.width, rect.height);
      ctx.fillStyle = "#fbfdff";
      ctx.fillRect(0, 0, rect.width, rect.height);

      scene.groups.forEach(g => drawGroup(ctx, g));

      const baseEdges = scene.baseEdges || [];
      baseEdges.forEach(edge => {
        const [from, to] = edge;
        const pts = edgePoints(scene, from, to);
        if (!pts) return;
        drawArrow(ctx, pts.start, pts.end, "#94a3b8", 1.2, false);
      });

      activeEdges.forEach((edge, index) => {
        const [from, to] = edge;
        const pts = edgePoints(scene, from, to);
        if (!pts) return;
        const color = palette[nodeInfo(scene, to).color] || palette.brand;
        const curve = drawArrow(ctx, pts.start, pts.end, color, 2.4, true);
        const t = ((stepElapsed / 1400) * speed + index * 0.18) % 1;
        const label = index === 0 ? step.tags[0] : "";
        drawPacket(ctx, curve, t, color, label);
      });

      Object.keys(scene.nodes).forEach(id => drawNode(ctx, scene, id, activeSet));
    }

    function tick(now) {
      const delta = now - lastFrame;
      lastFrame = now;
      if (playing) {
        stepElapsed += delta * speed;
        if (stepElapsed > stepDuration) {
          const scene = scenes[sceneKey];
          setStep((stepIndex + 1) % scene.steps.length);
        }
      }
      draw();
      requestAnimationFrame(tick);
    }

    function hitTest(pos) {
      const scene = scenes[sceneKey];
      const entries = Object.entries(scene.nodes).reverse();
      for (const [id, n] of entries) {
        if (pos.x >= n.x && pos.x <= n.x + n.w && pos.y >= n.y && pos.y <= n.y + n.h) {
          return id;
        }
      }
      return null;
    }

    canvas.addEventListener("mousemove", event => {
      const id = hitTest(canvasToLogical(event.clientX, event.clientY));
      hoverNode = id;
      canvas.style.cursor = id ? "pointer" : "default";
    });

    canvas.addEventListener("mouseleave", () => {
      hoverNode = null;
      canvas.style.cursor = "default";
    });

    canvas.addEventListener("click", event => {
      const id = hitTest(canvasToLogical(event.clientX, event.clientY));
      if (id) {
        selectedNode = id;
        renderNodeDetail();
        const info = nodeInfo(scenes[sceneKey], id);
        if (info.apiDomain) {
          activeApiDomain = info.apiDomain;
          renderApiPanel();
        }
      }
    });

    playBtn.addEventListener("click", () => {
      playing = !playing;
      playBtn.textContent = playing ? "Ⅱ" : "▶";
    });

    prevBtn.addEventListener("click", () => setStep(stepIndex - 1));
    nextBtn.addEventListener("click", () => setStep(stepIndex + 1));
    speedRange.addEventListener("input", event => {
      speed = Number(event.target.value);
    });

    apiSearchEl.addEventListener("input", event => {
      apiSearch = event.target.value;
      renderApiPanel();
    });

    window.addEventListener("resize", draw);

    if (!CanvasRenderingContext2D.prototype.roundRect) {
      CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
        roundedRectPath(this, x, y, w, h, r);
        return this;
      };
    }

    initNav();
    setScene("overview");
    requestAnimationFrame(tick);
  </script>
</body>
</html>
